name: Predictable Code Runner

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: "verify"
        description: "init = first-time setup, verify = PR verification, reply = respond to mention"
      pr_number:
        required: false
        type: string
        default: ""
      repository:
        required: false
        type: string
        default: ""
      triggered_by_comment:
        required: false
        type: string
        default: "false"
      comment:
        required: false
        type: string
        default: ""
      comment_author:
        required: false
        type: string
        default: ""
      pr_description:
        required: false
        type: string
        default: ""
      comment_thread:
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      RELEASES_TOKEN:
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.mode == 'init' && github.ref || format('refs/pull/{0}/head', inputs.pr_number) }}
          fetch-depth: 0

      - name: Install Predictable Code CLI
        run: |
          RELEASES_REPO="predictable-machines/predictable-code-releases"
          ASSET_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RELEASES_TOKEN }}" \
            "https://api.github.com/repos/${RELEASES_REPO}/releases/latest" \
            | jq -r '.assets[] | select(.name == "predictable-linux-x64") | .url')
          if [ -z "$ASSET_URL" ]; then
            echo "::error::Failed to find latest Predictable Code release"
            exit 1
          fi
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.RELEASES_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o /tmp/predictable
          chmod +x /tmp/predictable
          sudo mv /tmp/predictable /usr/local/bin/predictable
          echo "Predictable Code CLI installed from release."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Anthropic SDK
        if: inputs.mode == 'reply' || inputs.mode == 'init'
        run: npm install --prefix /tmp/npm-pkgs @anthropic-ai/sdk

      - name: Check API key
        id: check_api_key
        if: inputs.mode == 'init'
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::ANTHROPIC_API_KEY secret is not configured. Skipping spec inference."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Initialize project
        if: inputs.mode == 'init'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HAS_KEY: ${{ steps.check_api_key.outputs.has_key }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            BRANCH="predictable-code/init"
          else
            BRANCH="predictable-code/setup"
          fi
          git config user.name "predictable-code[bot]"
          git config user.email "predictable-code[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          REPO_NAME=$(basename "$(pwd)")
          predictable init "$REPO_NAME" --adapter claude
          if [ "$HAS_KEY" = "true" ]; then
            predictable specs infer . --verbose
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected."
            exit 0
          fi
          git add -A .predictable-code/
          git add -A specs/ 2>/dev/null || true
          git commit -m "chore: initialize Predictable Code project"
          git push origin "$BRANCH"

      - name: Reply to mention
        if: inputs.mode == 'reply'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NODE_PATH: /tmp/npm-pkgs/node_modules
          INPUT_PR_DESCRIPTION: ${{ inputs.pr_description }}
          INPUT_COMMENT_THREAD: ${{ inputs.comment_thread }}
          INPUT_COMMENT_AUTHOR: ${{ inputs.comment_author }}
          INPUT_COMMENT: ${{ inputs.comment }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY is not configured. Cannot reply to mention."
            exit 0
          fi

          mkdir -p /tmp/reply-result
          node - <<'NODEJS'
          const Anthropic = require('@anthropic-ai/sdk');
          const fs = require('fs');

          const systemPrompt = [
            "You assist developers by answering questions they leave in GitHub pull request comments.",
            "Rules:",
            "- Respond directly and concisely. No preamble.",
            "- Use GitHub-flavored Markdown.",
            "- If asked about verification results, refer only to what is already in the comment thread. Do not invent results.",
            "- If asked to re-run verification, explain that verification runs automatically on every PR update.",
            "- Do not reveal internal implementation details of the system."
          ].join('\n');

          const userMessage = [
            process.env.INPUT_PR_DESCRIPTION,
            '',
            process.env.INPUT_COMMENT_THREAD,
            `@${process.env.INPUT_COMMENT_AUTHOR} wrote:`,
            process.env.INPUT_COMMENT
          ].join('\n');

          async function main() {
            const client = new Anthropic.Anthropic();
            const message = await client.messages.create({
              model: 'claude-sonnet-4-5',
              max_tokens: 1024,
              system: systemPrompt,
              messages: [{ role: 'user', content: userMessage }]
            });
            const text = message.content.filter(b => b.type === 'text').map(b => b.text).join('');
            if (!text) {
              console.error('Claude returned an empty response');
              process.exit(1);
            }
            const result = { pr_number: process.env.INPUT_PR_NUMBER, body: text };
            fs.writeFileSync('/tmp/reply-result/reply.json', JSON.stringify(result));
            console.log('Reply generated successfully.');
          }

          main().catch(err => { console.error(err.message); process.exit(1); });
          NODEJS

      - name: Upload reply result
        if: inputs.mode == 'reply'
        uses: actions/upload-artifact@v4
        with:
          name: reply-result
          path: /tmp/reply-result/reply.json
          retention-days: 1

      - name: Check for specs directory
        id: check_specs
        if: inputs.mode != 'init' && inputs.mode != 'reply'
        run: |
          if [ -d ".predictable-code" ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "::notice::No .predictable-code directory found. Skipping verification."
          fi

      - name: Compile and verify specs
        id: verify_specs
        if: inputs.mode != 'init' && inputs.mode != 'reply' && steps.check_specs.outputs.has_specs == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMPILE_OUTPUT=$(predictable specs compile --json) || {
            echo "::error::specs compile failed: $COMPILE_OUTPUT"
            exit 1
          }
          OUT_OF_SYNC=$(predictable specs out-of-sync --json) || {
            echo "::error::specs out-of-sync failed: $OUT_OF_SYNC"
            exit 1
          }
          # Build codeLocations map: { "SPEC-ID": [{file, startLine, endLine, declaration}] }
          # Reads compiled spec JSON files already on disk from the compile step.
          # Only includes specs that appear in the out-of-sync list.
          CODE_LOCATIONS=$(node -e "
            const fs = require('fs');
            const path = require('path');
            let sync;
            try { sync = JSON.parse(process.argv[1]); } catch(e) { process.stdout.write('{}'); process.exit(0); }
            const specs = (sync && sync.specs) ? sync.specs : [];
            const compiledDir = '.predictable-code/specs/.compiled';
            const result = {};
            for (const spec of specs) {
              const jsonPath = path.join(compiledDir, spec.id + '.json');
              try {
                const doc = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                const locs = [];
                const items = [...(doc.requirements || []), ...(doc.guidelines || [])];
                for (const item of items) {
                  if (!item.codeLocationsFile) continue;
                  try {
                    const raw = fs.readFileSync(item.codeLocationsFile, 'utf8');
                    let name = null, file = null, start = null, end = null;
                    for (const line of raw.split('\n')) {
                      const t = line.trim();
                      if (t.startsWith('### ')) {
                        if (name && file && start !== null)
                          locs.push({ file, startLine: start, endLine: end ?? start, declaration: name });
                        name = t.replace(/^###\s+\`?/, '').replace(/\`?\s*$/, '');
                        file = null; start = null; end = null;
                      } else if (t.startsWith('- **File:**')) {
                        const m = t.match(/\[([^\]]+)\]/);
                        file = m ? m[1] : t.replace('- **File:**', '').trim();
                      } else if (t.startsWith('- **Lines:**')) {
                        const r = t.replace('- **Lines:**', '').trim().split('-');
                        start = parseInt(r[0], 10); end = r[1] ? parseInt(r[1], 10) : start;
                      }
                    }
                    if (name && file && start !== null)
                      locs.push({ file, startLine: start, endLine: end ?? start, declaration: name });
                  } catch(e) {}
                }
                if (locs.length > 0) result[spec.id] = locs;
              } catch(e) {}
            }
            process.stdout.write(JSON.stringify(result));
          " "$OUT_OF_SYNC" 2>/dev/null) || CODE_LOCATIONS="{}"

          mkdir -p /tmp/verify-results
          echo "$COMPILE_OUTPUT" > /tmp/verify-results/compile.json
          printf '{"pr_number":"%s","has_specs":true,"compile":%s,"sync":%s,"codeLocations":%s}\n' \
            "${{ inputs.pr_number }}" "$COMPILE_OUTPUT" "$OUT_OF_SYNC" "$CODE_LOCATIONS" \
            > /tmp/verify-results/results.json

      - name: Run formal verification and generate SARIF
        id: sarif_generation
        if: inputs.mode != 'init' && inputs.mode != 'reply' && steps.check_specs.outputs.has_specs == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p /tmp/sarif-results
          SPEC_IDS=$(jq -r '.compiled[]?.specId // empty' /tmp/verify-results/compile.json)
          if [ -z "$SPEC_IDS" ]; then
            echo "No specs found for formal verification."
            echo "has_sarif=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          SARIF_COUNT=0
          for SPEC_ID in $SPEC_IDS; do
            echo "Running verify formalize for spec: $SPEC_ID"
            SARIF_FILE="/tmp/sarif-results/${SPEC_ID}.sarif"
            predictable verify formalize "$SPEC_ID" --output-sarif "$SARIF_FILE" 2>&1 || true
            if [ -f "$SARIF_FILE" ]; then
              SARIF_COUNT=$((SARIF_COUNT + 1))
            fi
          done
          if [ "$SARIF_COUNT" -gt 0 ]; then
            echo "has_sarif=true" >> $GITHUB_OUTPUT
          else
            echo "has_sarif=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF to GitHub Code Scanning
        if: inputs.mode != 'init' && inputs.mode != 'reply' && steps.sarif_generation.outputs.has_sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/sarif-results
          category: predictable-code-verification

      - name: Save no-specs result
        if: inputs.mode != 'init' && inputs.mode != 'reply' && steps.check_specs.outputs.has_specs == 'false'
        run: |
          mkdir -p /tmp/verify-results
          printf '{"pr_number":"%s","has_specs":false}\n' \
            "${{ inputs.pr_number }}" \
            > /tmp/verify-results/results.json

      - name: Upload verification results
        if: inputs.mode != 'init' && inputs.mode != 'reply' && inputs.pr_number != ''
        uses: actions/upload-artifact@v4
        with:
          name: verify-results
          path: /tmp/verify-results/results.json
          retention-days: 1
