name: Predictable Code Runner

on:
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: "verify"
        description: "init = first-time setup, verify = PR verification, command = agent task"
      pr_number:
        required: false
        type: string
        default: ""
      repository:
        required: false
        type: string
        default: ""
      comment:
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      RELEASES_TOKEN:
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.mode == 'init' && github.ref || format('refs/pull/{0}/head', inputs.pr_number) }}
          fetch-depth: 0

      - name: Install Predictable Code CLI
        run: |
          RELEASES_REPO="predictable-machines/predictable-code-releases"
          ASSET_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RELEASES_TOKEN }}" \
            "https://api.github.com/repos/${RELEASES_REPO}/releases/latest" \
            | jq -r '.assets[] | select(.name == "predictable-linux-x64") | .url')
          if [ -z "$ASSET_URL" ]; then
            echo "::error::Failed to find latest Predictable Code release"
            exit 1
          fi
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.RELEASES_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL" -o /tmp/predictable
          chmod +x /tmp/predictable
          sudo mv /tmp/predictable /usr/local/bin/predictable
          echo "Predictable Code CLI installed from release."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check API key
        id: check_api_key
        if: inputs.mode == 'init'
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::ANTHROPIC_API_KEY secret is not configured. Skipping spec inference."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Claude CLI
        if: (inputs.mode == 'init' && steps.check_api_key.outputs.has_key == 'true') || inputs.mode == 'command'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding": true}' > ~/.claude/settings.json

      - name: Initialize project
        if: inputs.mode == 'init'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HAS_KEY: ${{ steps.check_api_key.outputs.has_key }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            BRANCH="predictable-code/init"
          else
            BRANCH="predictable-code/setup"
          fi
          git config user.name "predictable-code[bot]"
          git config user.email "predictable-code[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          REPO_NAME=$(basename "$(pwd)")
          predictable init "$REPO_NAME" --adapter claude
          if [ "$HAS_KEY" = "true" ]; then
            SOURCE_EXTS=$(find . -not -path './.git/*' -not -path './.predictable-code/*' \
              -type f -name '*.*' \
              | sed 's/.*\.//' \
              | grep -E '^[a-zA-Z0-9]+$' \
              | grep -vE '^(md|txt|json|yaml|yml|toml|xml|gitignore|gitattributes|lock|sum|mod|env|cfg|conf|ini|log|sh)$' \
              | sort -u \
              | tr '\n' ',' \
              | sed 's/,$//')
            if [ -n "$SOURCE_EXTS" ]; then
              predictable specs infer . --verbose --include-ext "$SOURCE_EXTS"
            else
              predictable specs infer . --verbose
            fi
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected."
            exit 0
          fi
          git add -A .predictable-code/
          git add -A specs/ 2>/dev/null || true
          git commit -m "chore: initialize Predictable Code project"
          git push origin "$BRANCH"

      - name: Run Predictable Code agent
        if: inputs.mode == 'command'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is not configured."
            exit 1
          fi

          PR_BRANCH=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ inputs.repository }}/pulls/${{ inputs.pr_number }}" \
            | jq -r '.head.ref')

          if [ -z "$PR_BRANCH" ] || [ "$PR_BRANCH" = "null" ]; then
            echo "::error::Could not resolve branch for PR ${{ inputs.pr_number }}"
            exit 1
          fi

          git config user.name "predictable-code[bot]"
          git config user.email "predictable-code[bot]@users.noreply.github.com"
          git checkout -b "$PR_BRANCH" --track "origin/$PR_BRANCH" 2>/dev/null \
            || git checkout "$PR_BRANCH"

          # Ensure npm global bin is in PATH so subprocesses (e.g. MCP sync) can find claude
          export PATH="$(npm root -g)/../bin:$PATH"

          mkdir -p /tmp/command-result
          FULL_COMMENT="PR #${{ inputs.pr_number }} in ${{ inputs.repository }}"$'\n\n'"${{ inputs.comment }}"
          predictable task \
            --comment "$FULL_COMMENT" \
            > /tmp/command-result/result.txt

      - name: Upload command result
        if: inputs.mode == 'command'
        uses: actions/upload-artifact@v4
        with:
          name: command-result-${{ inputs.pr_number }}
          path: /tmp/command-result/result.txt
          retention-days: 1

      - name: Check for specs directory
        id: check_specs
        if: inputs.mode != 'init' && inputs.mode != 'command'
        run: |
          if [ -d ".predictable-code" ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "::notice::No .predictable-code directory found. Skipping verification."
          fi

      - name: Compile and verify specs
        id: verify_specs
        if: inputs.mode != 'init' && inputs.mode != 'command' && steps.check_specs.outputs.has_specs == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COMPILE_OUTPUT=$(predictable specs compile --json) || {
            echo "::error::specs compile failed: $COMPILE_OUTPUT"
            exit 1
          }
          OUT_OF_SYNC=$(predictable specs out-of-sync --json) || {
            echo "::error::specs out-of-sync failed: $OUT_OF_SYNC"
            exit 1
          }
          mkdir -p /tmp/verify-results
          echo "$COMPILE_OUTPUT" > /tmp/verify-results/compile.json
          printf '{"pr_number":"%s","has_specs":true,"compile":%s,"sync":%s}\n' \
            "${{ inputs.pr_number }}" "$COMPILE_OUTPUT" "$OUT_OF_SYNC" \
            > /tmp/verify-results/results.json

      - name: Save no-specs result
        if: inputs.mode != 'init' && inputs.mode != 'command' && steps.check_specs.outputs.has_specs == 'false'
        run: |
          mkdir -p /tmp/verify-results
          printf '{"pr_number":"%s","has_specs":false}\n' \
            "${{ inputs.pr_number }}" \
            > /tmp/verify-results/results.json

      - name: Upload verification results
        if: inputs.mode != 'init' && inputs.mode != 'command' && inputs.pr_number != ''
        uses: actions/upload-artifact@v4
        with:
          name: verify-results
          path: /tmp/verify-results/results.json
          retention-days: 1
